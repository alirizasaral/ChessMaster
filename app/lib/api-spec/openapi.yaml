openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Chess Opening Trainer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chess
    description: Chess coaching and TTS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /coach:
    post:
      operationId: getCoachFeedback
      tags: [chess]
      summary: Get LLM coaching feedback for a chess move
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachRequest"
      responses:
        "200":
          description: Coaching feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CoachRequest:
      type: object
      required:
        - trigger
        - mode
        - transcript
      properties:
        trigger:
          type: string
          enum:
            - student_move
            - coach_move
            - off_line_move
            - undo
            - reset
            - game_over
        mode:
          type: string
          description: Context label such as Lesson or Free play
        transcript:
          type: string
          description: Formatted authoritative game transcript
        hint:
          type: string
          description: Optional pedagogical hint for this turn
        userName:
          type: string
          description: Optional student display name

    CoachResponse:
      type: object
      required:
        - feedback
      properties:
        feedback:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
